<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>J.A.R.V.I.S // Core Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0e14;
    --panel: #10161f;
    --panel-edge: #1c2733;
    --accent: #4ea8ff;
    --accent-dim: #2a5a8a;
    --amber: #ffb86b;
    --text: #e6edf3;
    --muted: #7c8b9a;
    --danger: #ff6b6b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background: radial-gradient(circle at 50% 0%, #101b28 0%, var(--bg) 55%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
  }
  .scanlines{
    pointer-events:none;
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    z-index:1;
  }
  .hud-grid{
    pointer-events:none;
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(78,168,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(78,168,255,0.05) 1px, transparent 1px);
    background-size: 28px 28px;
    mask-image: radial-gradient(circle at 50% 15%, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.15) 65%);
    -webkit-mask-image: radial-gradient(circle at 50% 15%, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.15) 65%);
    z-index:0;
  }
  .corner{
    pointer-events:none;
    position:fixed;
    width:22px; height:22px;
    border-color: var(--accent-dim);
    opacity:0.8;
    z-index:2;
  }
  .corner-tl{ top:10px; left:10px; border-top:2px solid; border-left:2px solid; }
  .corner-tr{ top:10px; right:10px; border-top:2px solid; border-right:2px solid; }
  .corner-bl{ bottom:10px; left:10px; border-bottom:2px solid; border-left:2px solid; }
  .corner-br{ bottom:10px; right:10px; border-bottom:2px solid; border-right:2px solid; }
  .telemetry{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color:var(--muted);
    letter-spacing:1px;
    padding-top:6px;
  }
  .telemetry .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    display:inline-block;
    margin-right:5px;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  header{
    padding: 18px 20px 10px;
    text-align:center;
    position:relative;
    z-index:2;
  }
  .brand{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    letter-spacing:7px;
    font-size:20px;
    color:var(--accent);
    text-shadow: 0 0 16px rgba(78,168,255,0.65), 0 0 32px rgba(78,168,255,0.25);
  }
  .brand span{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-weight:400;
    letter-spacing:3px;
    font-size:9px;
    color:var(--muted);
    text-shadow:none;
    margin-top:3px;
  }
  .status-line{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
    margin-top:4px;
    letter-spacing:1px;
    height:16px;
    transition: color 0.3s;
  }
  .status-line.live{color:var(--accent);}
  .status-line.speaking{color:var(--amber);}

  .orb-wrap{
    display:flex;
    justify-content:center;
    align-items:center;
    padding: 6px 0 18px;
    position:relative;
    z-index:2;
  }
  .orb-outer{
    position:relative;
    width:150px; height:150px;
    display:flex; align-items:center; justify-content:center;
  }
  .ring{
    position:absolute;
    border-radius:50%;
    border: 1px solid var(--accent-dim);
    opacity:0.6;
  }
  .ring1{width:150px;height:150px;}
  .ring2{width:120px;height:120px; border-color:rgba(78,168,255,0.25);}
  .ring3{
    width:172px; height:172px;
    border:1px dashed rgba(78,168,255,0.35);
    border-radius:50%;
  }
  .ticks{
    position:absolute;
    width:190px; height:190px;
    border-radius:50%;
  }
  .ticks::before, .ticks::after{
    content:'';
    position:absolute;
    background: var(--accent-dim);
  }
  .ticks::before{ top:0; left:50%; width:1px; height:8px; transform:translateX(-50%); }
  .ticks::after{ bottom:0; left:50%; width:1px; height:8px; transform:translateX(-50%); }
  .orb{
    width: 92px; height:92px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #6fc3ff 0%, #2f7fd6 40%, #103a63 100%);
    box-shadow: 0 0 30px rgba(78,168,255,0.55), inset 0 0 20px rgba(255,255,255,0.15);
    border:none;
    cursor:pointer;
    position:relative;
    z-index:3;
    transition: transform 0.15s ease, box-shadow 0.3s ease;
  }
  .orb:active{ transform: scale(0.95); }
  .orb.listening{
    animation: pulse 1.4s ease-in-out infinite;
    box-shadow: 0 0 45px rgba(78,168,255,0.85), inset 0 0 25px rgba(255,255,255,0.2);
  }
  .orb.thinking{
    animation: spin-glow 1.8s linear infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 30px rgba(78,168,255,0.5), inset 0 0 20px rgba(255,255,255,0.15); }
    50%{ box-shadow: 0 0 55px rgba(78,168,255,0.9), inset 0 0 28px rgba(255,255,255,0.25); }
  }
  @keyframes spin-glow{
    0%{ filter:hue-rotate(0deg) brightness(1); }
    50%{ filter:hue-rotate(15deg) brightness(1.2); }
    100%{ filter:hue-rotate(0deg) brightness(1); }
  }
  .ring.spin{ animation: spin 6s linear infinite; border-style:dashed; }
  .ring3.spin-rev{ animation: spin-rev 9s linear infinite; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  @keyframes spin-rev{ to{ transform: rotate(-360deg); } }
  .ticks.side{ transform: rotate(90deg); }

  @media (prefers-reduced-motion: reduce){
    .orb.listening, .orb.thinking, .ring.spin { animation: none !important; }
  }

  nav.tabs{
    display:flex;
    gap:2px;
    padding: 0 14px;
    position:relative; z-index:2;
  }
  nav.tabs button{
    flex:1;
    background: var(--panel);
    border:1px solid var(--panel-edge);
    color:var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:1px;
    padding:10px 6px;
    cursor:pointer;
    border-bottom:none;
    border-radius:8px 8px 0 0;
  }
  nav.tabs button.active{
    color: var(--accent);
    background: var(--panel);
    border-color: var(--accent-dim);
    box-shadow: 0 -2px 10px rgba(78,168,255,0.15);
  }

  main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding: 0 14px 14px;
    position:relative;
    z-index:2;
    min-height:0;
  }
  .panel{
    background: var(--panel);
    border:1px solid var(--panel-edge);
    border-radius:0 10px 10px 10px;
    flex:1;
    display:none;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
  }
  .panel.active{ display:flex; }

  #log{
    flex:1;
    overflow-y:auto;
    padding: 14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{
    max-width: 85%;
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 14px;
    line-height:1.45;
  }
  .msg.user{
    align-self:flex-end;
    background: var(--accent-dim);
    color: #eaf4ff;
    border-bottom-right-radius:2px;
  }
  .msg.assistant{
    align-self:flex-start;
    background: #182230;
    border: 1px solid var(--panel-edge);
    color: var(--text);
    border-bottom-left-radius:2px;
  }
  .msg.system{
    align-self:center;
    color: var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    background:none;
  }

  .input-row{
    display:flex;
    gap:8px;
    padding:10px;
    border-top:1px solid var(--panel-edge);
  }
  .input-row input{
    flex:1;
    background:#0d1319;
    border:1px solid var(--panel-edge);
    color:var(--text);
    border-radius:8px;
    padding:10px 12px;
    font-family:'Inter', sans-serif;
    font-size:14px;
  }
  .input-row input:focus{ outline:1px solid var(--accent); }
  .input-row button{
    background: var(--accent);
    color:#06141f;
    border:none;
    border-radius:8px;
    padding:0 16px;
    font-weight:600;
    cursor:pointer;
  }
  .input-row button:focus-visible, .orb:focus-visible, nav.tabs button:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:2px;
  }

  .list-wrap{ flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:8px; }
  .item{
    background:#151d27;
    border:1px solid var(--panel-edge);
    border-radius:8px;
    padding:10px 12px;
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
  }
  .item.done{ opacity:0.45; text-decoration:line-through; }
  .item .meta{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted); margin-left:auto; }
  .item .del{ background:none; border:none; color:var(--danger); font-size:16px; cursor:pointer; padding:2px 6px; }
  .item input[type=checkbox]{ width:16px; height:16px; accent-color: var(--accent); }
  .empty{ color:var(--muted); font-family:'JetBrains Mono', monospace; font-size:12px; text-align:center; padding:30px 10px; }

  .quick-add{ display:flex; gap:8px; padding:10px; border-top:1px solid var(--panel-edge); }
  .quick-add input{ flex:1; background:#0d1319; border:1px solid var(--panel-edge); color:var(--text); border-radius:8px; padding:10px 12px; font-size:14px; }
  .quick-add button{ background:var(--accent); color:#06141f; border:none; border-radius:8px; padding:0 16px; font-weight:600; cursor:pointer; }

  .hint{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color:var(--muted);
    padding: 8px 20px 14px;
    position:relative; z-index:2;
  }
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="hud-grid"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<header>
  <div class="brand">J . A . R . V . I . S<span>CORE INTERFACE // v1.0</span></div>
  <div class="status-line" id="statusLine">SYSTEMS IDLE</div>
  <div class="telemetry"><span class="dot"></span><span id="clockReadout">--:--:--</span><span>·</span><span id="dateReadout">----</span></div>
</header>

<div class="orb-wrap">
  <div class="orb-outer">
    <div class="ring ring3 spin-rev"></div>
    <div class="ring ring1 spin"></div>
    <div class="ring ring2"></div>
    <div class="ticks"></div>
    <div class="ticks side"></div>
    <button class="orb" id="orbBtn" aria-label="Tap to talk"></button>
  </div>
</div>

<nav class="tabs">
  <button class="tab-btn active" data-tab="chat">CHAT</button>
  <button class="tab-btn" data-tab="tasks">TASKS</button>
  <button class="tab-btn" data-tab="reminders">REMINDERS</button>
</nav>

<main>
  <section class="panel active" id="panel-chat">
    <div id="log"></div>
    <div class="input-row">
      <input type="text" id="textInput" placeholder="Type or tap the orb to talk..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </section>

  <section class="panel" id="panel-tasks">
    <div class="list-wrap" id="taskList"></div>
    <div class="quick-add">
      <input type="text" id="taskInput" placeholder="Add a task..." autocomplete="off">
      <button id="taskAddBtn">Add</button>
    </div>
  </section>

  <section class="panel" id="panel-reminders">
    <div class="list-wrap" id="reminderList"></div>
    <div class="quick-add">
      <input type="text" id="reminderInput" placeholder='Try: "walk the dog in 20 minutes"' autocomplete="off">
      <button id="reminderAddBtn">Set</button>
    </div>
  </section>
</main>

<div class="hint">VOICE + TASKS STAY ACTIVE WHILE THIS TAB IS OPEN · ADD TO HOME SCREEN FOR APP-LIKE ACCESS</div>

<script>
  function tick(){
    const now = new Date();
    const time = now.toLocaleTimeString('en-US', {hour12:false});
    const date = now.toLocaleDateString('en-US', {month:'short', day:'2-digit', year:'numeric'});
    const c = document.getElementById('clockReadout');
    const d = document.getElementById('dateReadout');
    if(c) c.textContent = time;
    if(d) d.textContent = date.toUpperCase();
  }
  tick();
  setInterval(tick, 1000);
</script>

<script>
(function(){
  const logEl = document.getElementById('log');
  const orbBtn = document.getElementById('orbBtn');
  const statusLine = document.getElementById('statusLine');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');

  const taskList = document.getElementById('taskList');
  const taskInput = document.getElementById('taskInput');
  const taskAddBtn = document.getElementById('taskAddBtn');

  const reminderList = document.getElementById('reminderList');
  const reminderInput = document.getElementById('reminderInput');
  const reminderAddBtn = document.getElementById('reminderAddBtn');

  let tasks = [];
  let reminders = [];
  let conversation = [];

  // ---------- Tabs ----------
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    });
  });

  // ---------- Persistence ----------
  async function loadData(){
    try{
      const res = await window.storage.get('jarvis-state', false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        tasks = parsed.tasks || [];
        reminders = parsed.reminders || [];
      }
    }catch(e){
      tasks = []; reminders = [];
    }
    renderTasks();
    renderReminders();
    rescheduleReminders();
  }

  async function saveData(){
    try{
      await window.storage.set('jarvis-state', JSON.stringify({tasks, reminders}), false);
    }catch(e){
      addSystemMsg('Could not save data locally.');
    }
  }

  // ---------- Chat log ----------
  function addMsg(role, text){
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function addSystemMsg(text){
    const div = document.createElement('div');
    div.className = 'msg system';
    div.textContent = text;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
  }

  addSystemMsg('JARVIS online. Ask me anything, or say things like "remind me to check the oven in 10 minutes" or "add task buy groceries".');

  // ---------- Speech synthesis ----------
  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.02;
    utter.pitch = 0.95;
    utter.onstart = ()=> setStatus('speaking', 'RESPONDING');
    utter.onend = ()=> setStatus('idle', 'SYSTEMS IDLE');
    window.speechSynthesis.speak(utter);
  }

  function setStatus(mode, label){
    statusLine.textContent = label;
    statusLine.classList.remove('live','speaking');
    orbBtn.classList.remove('listening','thinking');
    if(mode==='listening'){ statusLine.classList.add('live'); orbBtn.classList.add('listening'); }
    if(mode==='thinking'){ orbBtn.classList.add('thinking'); statusLine.classList.add('live'); }
    if(mode==='speaking'){ statusLine.classList.add('speaking'); }
  }

  // ---------- Speech recognition ----------
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognizer = null;
  let isListening = false;

  if(SpeechRecognition){
    recognizer = new SpeechRecognition();
    recognizer.lang = 'en-US';
    recognizer.interimResults = false;
    recognizer.maxAlternatives = 1;

    recognizer.onstart = ()=>{ isListening = true; setStatus('listening', 'LISTENING...'); };
    recognizer.onend = ()=>{ isListening = false; if(statusLine.textContent==='LISTENING...') setStatus('idle','SYSTEMS IDLE'); };
    recognizer.onerror = (e)=>{
      isListening = false;
      setStatus('idle','SYSTEMS IDLE');
      addSystemMsg('Voice input error: ' + e.error);
    };
    recognizer.onresult = (e)=>{
      const transcript = e.results[0][0].transcript;
      handleInput(transcript);
    };
  } else {
    addSystemMsg('Voice input is not supported in this browser. Use Chrome on Android, or type below.');
  }

  orbBtn.addEventListener('click', ()=>{
    if(!recognizer){ addSystemMsg('Voice input unavailable — try typing instead.'); return; }
    if(isListening){ recognizer.stop(); return; }

    if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
      navigator.mediaDevices.getUserMedia({audio:true})
        .then(stream=>{
          stream.getTracks().forEach(t=>t.stop());
          try{ recognizer.start(); }
          catch(e){
            if(e.name !== 'InvalidStateError'){
              addSystemMsg('Could not start listening: ' + (e.message || e.name));
            }
          }
        })
        .catch(err=>{
          addSystemMsg('Microphone blocked: ' + err.name + '. Check the site permissions (tap the lock icon in the address bar) or your phone Settings > Apps > Chrome > Permissions > Microphone.');
        });
    } else {
      try{ recognizer.start(); }
      catch(e){ addSystemMsg('Could not start listening: ' + (e.message || e.name)); }
    }
  });

  // ---------- Input handling ----------
  sendBtn.addEventListener('click', ()=>{
    const val = textInput.value.trim();
    if(!val) return;
    textInput.value = '';
    handleInput(val);
  });
  textInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ sendBtn.click(); }
  });

  function handleInput(text){
    addMsg('user', text);

    const reminderMatch = matchReminder(text);
    if(reminderMatch){
      createReminder(reminderMatch.task, reminderMatch.ms);
      const confirmMsg = 'Reminder set: "' + reminderMatch.task + '" in ' + reminderMatch.label + '.';
      addMsg('assistant', confirmMsg);
      speak(confirmMsg);
      return;
    }

    const taskMatch = matchAddTask(text);
    if(taskMatch){
      addTask(taskMatch);
      const confirmMsg = 'Added to your tasks: "' + taskMatch + '".';
      addMsg('assistant', confirmMsg);
      speak(confirmMsg);
      return;
    }

    askClaude(text);
  }

  // ---------- Command parsing ----------
  function matchReminder(text){
    const re = /remind me to (.+?) in (\d+)\s*(second|seconds|minute|minutes|hour|hours)\b/i;
    const m = text.match(re);
    if(!m) return null;
    const task = m[1].trim();
    const amount = parseInt(m[2], 10);
    const unit = m[3].toLowerCase();
    let ms, label;
    if(unit.startsWith('second')){ ms = amount*1000; label = amount+' second'+(amount===1?'':'s'); }
    else if(unit.startsWith('minute')){ ms = amount*60*1000; label = amount+' minute'+(amount===1?'':'s'); }
    else { ms = amount*60*60*1000; label = amount+' hour'+(amount===1?'':'s'); }
    return {task, ms, label};
  }

  function matchAddTask(text){
    let m = text.match(/add (?:a )?task(?: to)? (.+)/i);
    if(m) return m[1].trim();
    m = text.match(/add (.+) to (?:my )?(?:task|to-?do) list/i);
    if(m) return m[1].trim();
    return null;
  }

  // ---------- Tasks ----------
  function addTask(text){
    tasks.push({id: Date.now()+'-'+Math.random().toString(36).slice(2,7), text, done:false});
    renderTasks();
    saveData();
  }
  function toggleTask(id){
    const t = tasks.find(t=>t.id===id);
    if(t) t.done = !t.done;
    renderTasks();
    saveData();
  }
  function deleteTask(id){
    tasks = tasks.filter(t=>t.id!==id);
    renderTasks();
    saveData();
  }
  function renderTasks(){
    taskList.innerHTML = '';
    if(tasks.length===0){
      taskList.innerHTML = '<div class="empty">No tasks yet. Add one below or say "add task ...".</div>';
      return;
    }
    tasks.slice().reverse().forEach(t=>{
      const div = document.createElement('div');
      div.className = 'item' + (t.done ? ' done' : '');
      div.innerHTML = '<input type="checkbox" ' + (t.done?'checked':'') + '> <span style="flex:1">'+escapeHtml(t.text)+'</span> <button class="del">✕</button>';
      div.querySelector('input').addEventListener('change', ()=>toggleTask(t.id));
      div.querySelector('.del').addEventListener('click', ()=>deleteTask(t.id));
      taskList.appendChild(div);
    });
  }
  taskAddBtn.addEventListener('click', ()=>{
    const val = taskInput.value.trim();
    if(!val) return;
    addTask(val);
    taskInput.value = '';
  });
  taskInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') taskAddBtn.click(); });

  // ---------- Reminders ----------
  function createReminder(task, ms){
    const due = Date.now() + ms;
    const rem = {id: Date.now()+'-'+Math.random().toString(36).slice(2,7), task, due, fired:false};
    reminders.push(rem);
    renderReminders();
    saveData();
    scheduleReminder(rem);
  }
  function scheduleReminder(rem){
    const delay = rem.due - Date.now();
    if(delay <= 0){
      if(!rem.fired) fireReminder(rem);
      return;
    }
    setTimeout(()=>{
      const current = reminders.find(r=>r.id===rem.id);
      if(current && !current.fired) fireReminder(current);
    }, Math.min(delay, 2147483000));
  }
  function fireReminder(rem){
    rem.fired = true;
    const msg = 'Reminder: ' + rem.task;
    addMsg('assistant', msg);
    speak(msg);
    if('Notification' in window && Notification.permission === 'granted'){
      new Notification('Nightwalker Core', {body: rem.task});
    }
    renderReminders();
    saveData();
  }
  function rescheduleReminders(){
    reminders.forEach(r=>{ if(!r.fired) scheduleReminder(r); });
    if('Notification' in window && Notification.permission === 'default'){
      Notification.requestPermission();
    }
  }
  function deleteReminder(id){
    reminders = reminders.filter(r=>r.id!==id);
    renderReminders();
    saveData();
  }
  function renderReminders(){
    reminderList.innerHTML = '';
    if(reminders.length===0){
      reminderList.innerHTML = '<div class="empty">No reminders set. Try "walk the dog in 20 minutes" below.</div>';
      return;
    }
    reminders.slice().reverse().forEach(r=>{
      const div = document.createElement('div');
      div.className = 'item' + (r.fired ? ' done' : '');
      const remaining = r.due - Date.now();
      const timeLabel = r.fired ? 'done' : formatRemaining(remaining);
      div.innerHTML = '<span style="flex:1">'+escapeHtml(r.task)+'</span> <span class="meta">'+timeLabel+'</span> <button class="del">✕</button>';
      div.querySelector('.del').addEventListener('click', ()=>deleteReminder(r.id));
      reminderList.appendChild(div);
    });
  }
  function formatRemaining(ms){
    if(ms<=0) return 'due';
    const mins = Math.round(ms/60000);
    if(mins < 1) return '<1 min';
    if(mins < 60) return mins+' min';
    return Math.round(mins/60)+' hr';
  }
  setInterval(renderReminders, 30000);

  reminderAddBtn.addEventListener('click', ()=>{
    const val = reminderInput.value.trim();
    if(!val) return;
    const parsed = matchReminder('remind me to ' + val);
    if(parsed){
      createReminder(parsed.task, parsed.ms);
      reminderInput.value = '';
    } else {
      addSystemMsg('Format tip: "task in N minutes/hours" — e.g. "walk the dog in 20 minutes".');
    }
  });
  reminderInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') reminderAddBtn.click(); });

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Claude API ----------
  async function askClaude(userText){
    setStatus('thinking', 'THINKING...');
    conversation.push({role:'user', content: userText});
    try{
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:1000,
          system:'You are JARVIS, a voice assistant running on the user\\'s Android phone. Keep replies short, natural, and conversational since they will be read aloud by text-to-speech — avoid markdown, lists, or symbols. Be warm but efficient, like a capable assistant, not overly formal.',
          messages: conversation
        })
      });
      const data = await response.json();
      const reply = (data.content || []).map(b=>b.text||'').join(' ').trim() || 'I did not get a clear response that time.';
      conversation.push({role:'assistant', content: reply});
      addMsg('assistant', reply);
      speak(reply);
    }catch(e){
      setStatus('idle','SYSTEMS IDLE');
      addSystemMsg('Connection error — could not reach the assistant brain.');
    }
  }

  loadData();
  setStatus('idle','SYSTEMS IDLE');
})();
</script>
